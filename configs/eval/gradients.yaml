seed: 42
device: auto
dtype: float32
results_dir: results

dataset:
  name: imagenet_val_clip_vitb16_demo
  x_path: data/embeddings/clip_vitb16/imagenet_val_X.pt
  y_path: data/embeddings/clip_vitb16/imagenet_val_Y.pt

grid:
  objective: infonce        # or 'loob'
  N: [2048, 8192]
  tau: [0.10, 0.25, 0.50]
  covariance: ["diag", "full"]
  shrinkage: [0.0, 0.05]
  topk: 10

batches_per_condition: 20
chunk_size: 4096
